<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet | Quản lý Chi tiêu Cá nhân</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fas fa-wallet"></i> Ví Điện Tử Của Tôi</h1>
        </header>

        <div class="balance-container">
            <h4>Số Dư Hiện Tại</h4>
            <h1 id="balance" class="balance-amount">$0.00</h1>
            
            <div class="income-expense-container">
                <div class="stat income">
                    <h4><i class="fas fa-plus-circle"></i> THU NHẬP</h4>
                    <p id="money-plus" class="money plus">+$0.00</p>
                </div>
                <div class="stat expense">
                    <h4><i class="fas fa-minus-circle"></i> CHI TIÊU</h4>
                    <p id="money-minus" class="money minus">-$0.00</p>
                </div>
            </div>
        </div>

        <div class="history-container">
            <h3>Lịch sử Giao dịch</h3>
            <ul id="list" class="list">
                </ul>
        </div>

        <div class="form-container">
            <h3><i class="fas fa-plus"></i> Thêm Giao dịch Mới</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Tên giao dịch</label>
                    <input type="text" id="text" placeholder="Ví dụ: Ăn sáng, Lương, Mua sách..." />
                </div>
                
                <div class="form-control-row">
                    <div class="input-group">
                        <label for="amount">Số tiền (<span class="unit">VND</span>)</label>
                        <input type="number" id="amount" placeholder="Nhập số tiền..." />
                    </div>
                    <div class="input-group">
                        <label for="type">Loại</label>
                        <select id="type">
                            <option value="EXPENSE" selected>Chi tiêu (-)</option>
                            <option value="INCOME">Thu nhập (+)</option>
                        </select>
                    </div>
                </div>

                <div class="form-messages" id="form-messages"></div>

                <button class="btn">Thêm Giao dịch</button>
            </form>
        </div>
    </div>

    <script type="module" src="dist/app.js"></script> </body>
</html>
